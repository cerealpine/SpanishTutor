<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Tutor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: sans-serif;
  background: #111;
  color: #eee;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Setup screen ── */
#setup {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 32px 24px;
}
#setup h1 { font-size: 1.8rem; margin-bottom: 8px; color: #f0c040; }
#setup p  { color: #aaa; font-size: 0.9rem; text-align: center; margin-bottom: 24px; line-height: 1.6; }
#setup a  { color: #f0c040; }
#setup input {
  width: 100%; max-width: 360px;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: #eee;
  font-size: 1rem;
  margin-bottom: 12px;
  outline: none;
}
#setup input:focus { border-color: #f0c040; }
#setup button {
  width: 100%; max-width: 360px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #f0c040;
  color: #111;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
}
#setup-error { color: #e05; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

/* ── Main app ── */
#app {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

#toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}
#toolbar h1 { font-size: 1.1rem; color: #f0c040; }
#key-btn {
  background: none;
  border: 1px solid #333;
  color: #888;
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 0.75rem;
  cursor: pointer;
}
#key-btn:hover { border-color: #f0c040; color: #f0c040; }

#messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg {
  max-width: 85%;
  padding: 12px 14px;
  border-radius: 16px;
  font-size: 0.95rem;
  line-height: 1.5;
  animation: pop 0.2s ease;
}
@keyframes pop { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }

.msg.ai   { background: #1e1e1e; border: 1px solid #2a2a2a; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.user { background: #2a2000; border: 1px solid #3a3000; color: #f0c040; align-self: flex-end; border-bottom-right-radius: 4px; }

.correction {
  margin-top: 8px;
  padding: 8px 10px;
  background: #1a0a0a;
  border-left: 3px solid #c04;
  border-radius: 6px;
  font-size: 0.82rem;
  color: #ccc;
  line-height: 1.5;
}
.correction .fixed { color: #6d6; margin-top: 2px; }
.correction .why   { color: #888; margin-top: 2px; font-style: italic; }

#bottom {
  flex-shrink: 0;
  border-top: 1px solid #222;
  padding: 14px 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#status {
  font-size: 0.82rem;
  color: #666;
  font-style: italic;
  min-height: 20px;
  text-align: center;
}
#status.active { color: #f0c040; }

#mic {
  align-self: center;
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 2px solid #333;
  background: #1a1a1a;
  color: #aaa;
  font-size: 1.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  position: relative;
}
#mic:hover { border-color: #f0c040; color: #f0c040; }
#mic.listening {
  background: #c03;
  border-color: #c03;
  color: white;
  animation: ring 1.5s infinite;
}
@keyframes ring {
  0%,100% { box-shadow: 0 0 0 0 rgba(200,0,50,0.5); }
  50%      { box-shadow: 0 0 0 14px rgba(200,0,50,0); }
}

#hint { font-size: 0.75rem; color: #444; text-align: center; }
</style>
</head>
<body>

<!-- Setup -->
<div id="setup">
  <h1>El Tutor 🇪🇸</h1>
  <p>A Spanish conversation partner in your pocket.<br>
     Get a free API key at <a href="https://console.groq.com" target="_blank">console.groq.com</a> — no credit card needed.</p>
  <input type="password" id="key-input" placeholder="Paste your Groq key (gsk_...)" />
  <button onclick="saveKey()">Start Speaking</button>
  <div id="setup-error"></div>
</div>

<!-- App -->
<div id="app">
  <div id="toolbar">
    <h1>El Tutor 🇪🇸</h1>
    <button id="key-btn" onclick="showSetup()">Change key</button>
  </div>
  <div id="messages"></div>
  <div id="bottom">
    <div id="status">Tap the mic to start speaking</div>
    <button id="mic" onclick="toggleMic()">🎤</button>
    <div id="hint">Tap once to start · tap again to send early</div>
  </div>
</div>

<script>
// ── globals ───────────────────────────────────────────────────────────────
var groqKey     = localStorage.getItem("groq_key") || "";
var convo       = [];   // [{role, content}]
var recog       = null;
var listening   = false;
var transcript  = "";
var silTimer    = null;
var SILENCE_MS  = 2000;
var busy        = false;

// ── setup ─────────────────────────────────────────────────────────────────
function saveKey() {
  var k = document.getElementById("key-input").value.trim();
  if (k.length < 8) {
    document.getElementById("setup-error").textContent = "Key looks too short — check and try again.";
    return;
  }
  groqKey = k;
  localStorage.setItem("groq_key", k);
  showApp();
}

document.getElementById("key-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") saveKey();
});

function showSetup() {
  document.getElementById("setup").style.display = "flex";
  document.getElementById("app").style.display   = "none";
  document.getElementById("key-input").value = groqKey;
}

function showApp() {
  document.getElementById("setup").style.display = "none";
  document.getElementById("app").style.display   = "flex";
  if (convo.length === 0) greet();
}

// ── greeting ──────────────────────────────────────────────────────────────
function greet() {
  var g = "Hola! Soy tu tutor de español. Como te llamas y de donde eres?";
  addBubble("ai", g, null);
  convo.push({ role: "assistant", content: g });
  say(g);
}

// ── speech recognition ────────────────────────────────────────────────────
function initSpeech() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus("Voice not supported — try Chrome");
    document.getElementById("mic").style.opacity = "0.3";
    document.getElementById("mic").style.pointerEvents = "none";
    return;
  }
  recog = new SR();
  recog.lang = "es-ES";
  recog.continuous = false;
  recog.interimResults = true;

  recog.onresult = function(e) {
    transcript = Array.from(e.results).map(function(r){ return r[0].transcript; }).join("");
    setStatus(transcript, true);
    clearTimeout(silTimer);
    silTimer = setTimeout(function() {
      if (listening && transcript.trim()) stopAndSend();
    }, SILENCE_MS);
  };

  recog.onend = function() {
    if (!listening) return;
    // browser cut us off — restart unless we triggered it
    try { recog.start(); } catch(e) {}
  };

  recog.onerror = function(e) {
    if (e.error === "no-speech" && listening) {
      try { recog.start(); } catch(ex) {}
      return;
    }
    if (e.error === "aborted") return;
    stopListening();
    setStatus("Mic error: " + e.error);
  };
}

function toggleMic() {
  if (busy) return;
  if (listening) {
    stopAndSend();
  } else {
    startListening();
  }
}

function startListening() {
  transcript = "";
  clearTimeout(silTimer);
  listening = true;
  document.getElementById("mic").classList.add("listening");
  setStatus("Listening...", true);
  try { recog.start(); } catch(e) {}
}

function stopListening() {
  clearTimeout(silTimer);
  listening = false;
  document.getElementById("mic").classList.remove("listening");
  try { recog.stop(); } catch(e) {}
}

function stopAndSend() {
  var text = transcript.trim();
  stopListening();
  if (text) {
    setStatus("Sending...");
    sendToAI(text);
  } else {
    setStatus("Tap the mic to start speaking");
  }
}

// ── AI call ───────────────────────────────────────────────────────────────
var SYSTEM = "You are a friendly Spanish conversation tutor. Only speak in Spanish — never translate into English. Keep replies short (2-4 sentences) and conversational. Ask a follow-up question each time to keep the conversation going.\n\nAfter your reply, if the user made any grammar or vocabulary mistakes, add a correction in this exact format on a new line:\n[CORRECTION|original: ...|fixed: ...|why: ...]\nOnly include this if there was an actual mistake. Do not include it otherwise.";

function sendToAI(userText) {
  busy = true;
  addBubble("user", userText, null);
  convo.push({ role: "user", content: userText });

  var typingEl = addBubble("ai", "...", null);
  typingEl.style.color = "#555";

  var msgs = [{ role: "system", content: SYSTEM }].concat(convo);

  fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + groqKey
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      max_tokens: 300,
      messages: msgs
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    typingEl.remove();

    if (data.error) {
      addBubble("ai", "Error: " + data.error.message, null);
      busy = false;
      setStatus("Tap the mic to start speaking");
      return;
    }

    var raw = data.choices[0].message.content || "";

    // Parse optional correction block
    var corrData  = null;
    var corrMatch = raw.match(/\[CORRECTION\|original:\s*(.*?)\|fixed:\s*(.*?)\|why:\s*(.*?)\]/s);
    var aiText    = raw.replace(/\[CORRECTION[^\]]*\]/s, "").trim();

    if (corrMatch) {
      corrData = { original: corrMatch[1].trim(), fixed: corrMatch[2].trim(), why: corrMatch[3].trim() };
    }

    convo.push({ role: "assistant", content: raw });
    addBubble("ai", aiText, corrData);
    say(aiText);

    busy = false;
    setStatus("Tap the mic to respond");
  })
  .catch(function(err) {
    typingEl.remove();
    addBubble("ai", "Failed to reach Groq. Check your connection or API key.");
    busy = false;
    setStatus("Tap the mic to start speaking");
  });
}

// ── UI helpers ────────────────────────────────────────────────────────────
function addBubble(role, text, corrData) {
  var msgs = document.getElementById("messages");
  var div  = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;

  if (corrData) {
    var c = document.createElement("div");
    c.className = "correction";
    c.innerHTML = "You said: <em>" + esc(corrData.original) + "</em>"
      + '<div class="fixed">Better: ' + esc(corrData.fixed) + '</div>'
      + '<div class="why">' + esc(corrData.why) + '</div>';
    div.appendChild(c);
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function setStatus(text, active) {
  var el = document.getElementById("status");
  el.textContent = text;
  el.className = active ? "active" : "";
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── TTS ───────────────────────────────────────────────────────────────────
function say(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = "es-ES";
  u.rate = 0.9;
  var voices = window.speechSynthesis.getVoices();
  var esVoice = voices.find(function(v){ return v.lang.startsWith("es"); });
  if (esVoice) u.voice = esVoice;
  window.speechSynthesis.speak(u);
}

// ── boot ──────────────────────────────────────────────────────────────────
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}

initSpeech();

if (groqKey) {
  showApp();
}
</script>
</body>
</html>
